              var size = g === groupCount - 1
                ? indices.length - used
                : 1 + Math.floor(Math.random() * Math.ceil((indices.length - used) / (groupCount - g)));
              size = Math.min(size, indices.length - used);
              if(size <= 0) break;

              var groupIndices = indices.slice(used, used + size);
              used += size;

              // Accumulate delay — first group near-instant, rest stagger 150–450ms apart
              cumDelay += g === 0 ? Math.floor(Math.random() * 200) : 150 + Math.floor(Math.random() * 300);

              (function(gDelay, gIndices){
                setTimeout(function(){
                  gIndices.forEach(function(idx){
                    if(els[idx]){
                      // Tiny per-label jitter within the group — 0–80ms
                      var jitter = Math.floor(Math.random() * 80);
                      var transMs = 600 + Math.floor(Math.random() * 300);
                      setTimeout(function(){
                        _setLabel(els[idx], 0, transMs, 'cubic-bezier(.22,1,.36,1)');
                      }, jitter);
                      // Record the furthest point any label animation will finish
                      _latestFinish = Math.max(_latestFinish, gDelay + jitter + transMs);
                    }
                  });
                }, gDelay);
              })(cumDelay, groupIndices);
            }

            // Reset _lensBlurred exactly when the last label finishes — no guesswork.
            // Add 50ms buffer for browser paint jitter (MDN: setTimeout is minimum delay,
            // actual firing can be slightly later under load).
            if(_lensResetTmr) clearTimeout(_lensResetTmr);
            _lensResetTmr = setTimeout(function(){
              _lensBlurred = false;
              _lensResetTmr = null;
            }, _latestFinish + 50);
          }, holdTime);
        }
        _scheduleLens();
      }, delay);
    }
    // Start after intro is done — don't interfere with crystal landing
    setTimeout(_scheduleLens, 5500);
  }
  window.addEventListener('resize',function(){
    W=window.innerWidth; H=window.innerHeight;
    renderer.setPixelRatio(dpr * ssaa);
    renderer.setSize(W, H, false);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    camera.aspect=W/H; camera.updateProjectionMatrix();
    conCanvas.width=W; conCanvas.height=H;
  });

  // Orientation change — crystal positions are baked at init, reload to recalculate
  if(isMobile){
    window.addEventListener('orientationchange', function(){
      setTimeout(function(){ location.reload(); }, 400);
    });
  }

})();
</script>

<script>
// ══ LIGHTBOX ══
// curLbIdx is always kept as a STRING to match the values returned by
// getAttribute('data-lbidx'). Array.indexOf() uses strict equality (===),
// so a numeric 0 would never match string entries and indexOf() would
// always return -1, causing Prev/Next to jump to the wrong image on first open.
var curLbIdx  = '';
var _lbPre    = null;
var _lbTmr    = null;
var _lbCloseTmr = null;
var _lbSibs   = [];

function _lbGetSiblings(){
  var body = document.getElementById('panelBody');
  if(!body) return [curLbIdx];
  return Array.from(body.querySelectorAll('[data-lbidx]')).map(function(el){
    return el.getAttribute('data-lbidx'); // keep as string — idx format is e.g. "painting_0"
  });
}

function _lbStop(){
  if(_lbPre){ _lbPre = null; } // _lbPre is a cancel token (plain object), not an Image — just nullify
  clearTimeout(_lbTmr);
  document.getElementById('lbSpinner').classList.remove('vis');
}

function _lbShow(idx, dir){
  // dir: 1=forward, -1=back, 0/undefined=fade only
  _lbStop();

  var d        = _lbMeta[idx] || {title:'',en:'',desc:''};
  var el       = document.querySelector('[data-lbidx="'+idx+'"]');
  var src      = (el && el.getAttribute('data-lbsrc')) || '';
  if(!src && el){ var _fi=el.querySelector('img'); if(_fi) src=_fi.getAttribute('src')||_fi.src||''; }

  var lbImg    = document.getElementById('lbImg');
  var lbImgBox = document.getElementById('lbImgBox');
  var lbColEl  = document.querySelector('.lb-col');
  var lbSideEl = document.getElementById('lbSide');
  var spin     = document.getElementById('lbSpinner');

  // Update text immediately
  document.getElementById('lbTitle').textContent = d.title;
  document.getElementById('lbEn').textContent    = d.en;
  document.getElementById('lbIdx').textContent   = '';
  document.getElementById('lbDesc').textContent  = (d.desc||'').replace(/\n\n/g,'\n');

  // Exit animation
  lbImg.classList.remove('lb-fadein');
  lbImg.style.transition = 'opacity .18s ease, transform .18s cubic-bezier(.4,0,.2,1)';
  lbImg.style.opacity    = '0';
  lbImg.style.transform  = dir ? 'translateX('+(dir>0?'-28px':'28px')+')' : '';
  lbSideEl.style.opacity = '0';

  // Spinner if slow to load
  _lbTmr = setTimeout(function(){ spin.classList.add('vis'); }, 120);

  // Token-based cancel: each call gets a unique object; stale callbacks bail early
  var token = {};
  _lbPre = token;

  function commit(nw, nh){
    if(_lbPre !== token) return;
    _lbStop();

    if(dir){
      lbImg.style.transition = 'none';
      lbImg.style.transform  = 'translateX('+(dir>0?'28px':'-28px')+')';
      lbImg.style.opacity    = '0';
      void lbImg.offsetWidth;
      lbImg.style.transition = 'opacity .35s cubic-bezier(.22,1,.36,1), transform .35s cubic-bezier(.22,1,.36,1)';
    } else {
      lbImg.style.transition = '';
      lbImg.style.transform  = '';
      lbImg.style.opacity    = '0';
      void lbImg.offsetWidth;
      lbImg.classList.add('lb-fadein');
    }
    lbImg.style.opacity    = '1';
    lbImg.style.transform  = 'translateX(0)';
    lbSideEl.style.opacity = '1';

    if(window.innerWidth > 768 && nw && nh){
      var isWide = nw > nh;
      lbImg.style.width=''; lbImg.style.maxWidth=''; lbImg.style.maxHeight=''; lbImg.style.objectFit='';
      if(lbImgBox) lbImgBox.style.width='';
      if(lbColEl)  lbColEl.style.width='';
      if(lbSideEl){ lbSideEl.style.position=''; lbSideEl.style.transform='';
        lbSideEl.style.left=''; lbSideEl.style.top=''; lbSideEl.style.width=''; lbSideEl.style.marginTop=''; }
      if(isWide){
        lbImg.style.width='auto'; lbImg.style.maxWidth='78vw';
        lbImg.style.maxHeight='72vh'; lbImg.style.objectFit='contain';
        if(lbColEl) lbColEl.style.width='fit-content';
        if(lbSideEl){ lbSideEl.style.position='static'; lbSideEl.style.transform='none';
          lbSideEl.style.left='auto'; lbSideEl.style.top='auto';
          lbSideEl.style.width='100%'; lbSideEl.style.marginTop='14px'; }
      }
    }
  }

  if(!src){ lbImg.src=''; commit(0,0); return; }

  var tmp = new Image();
  tmp.onload = function(){
    if(_lbPre !== token){ tmp.onload=tmp.onerror=null; return; }
    var nw=tmp.naturalWidth, nh=tmp.naturalHeight;
    tmp.onload=tmp.onerror=null;
    lbImg.src=src;
    commit(nw, nh);
  };
  tmp.onerror = function(){
    if(_lbPre !== token){ tmp.onload=tmp.onerror=null; return; }
    tmp.onload=tmp.onerror=null;
    _lbStop();
  };
  tmp.src = src;
  if(tmp.complete && tmp.naturalWidth && _lbPre===token){
    tmp.onload=tmp.onerror=null;
    lbImg.src=src;
    commit(tmp.naturalWidth, tmp.naturalHeight);
  }
}

function openLb(idx){
  // Clear cursor hover state — same reason as openPanel
  if(typeof hoveredIdx !== 'undefined'){ hoveredIdx = -1; }
  document.body.classList.remove('hovering');
  curLbIdx  = String(idx); // always string — _lbSibs entries are strings from getAttribute()
  _lbSibs   = _lbGetSiblings();
  var btns  = document.querySelector('.lb-btns');
  if(btns) btns.style.opacity = '';
  var img   = document.getElementById('lbImg');
  var side  = document.getElementById('lbSide');
  // Clear old images and ensure no remnants are displayed
  if(_lbCloseTmr){ clearTimeout(_lbCloseTmr); _lbCloseTmr = null; }
  _lbStop();
  img.classList.remove('lb-fadein');
  img.src = '';
  img.style.opacity = '0';
  side.style.opacity = '0';
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow = 'hidden';
  var lb = document.getElementById('lb');
  lb.addEventListener('touchmove', window._lbTouchMoveProxy, {passive:false});
  _lbShow(idx);
}

function closeLb(){
  _lbStop();
  //Immediately hide buttons and text
  var btns   = document.querySelector('.lb-btns');
  if(btns) btns.style.opacity = '0';
  var sideEl = document.getElementById('lbSide');
  if(sideEl) sideEl.style.opacity = '0';
  var lb = document.getElementById('lb');
  lb.classList.remove('on');
  lb.removeEventListener('touchmove', window._lbTouchMoveProxy);
  lb.style.alignItems = '';
  lb.style.overflowY  = '';
  document.body.style.overflow = '';
  if(_lbCloseTmr){ clearTimeout(_lbCloseTmr); _lbCloseTmr = null; }
  // Reset styles after the lightbox fade-out completes (350ms = lb CSS opacity transition)
  // NOTE: do NOT touch btns.opacity or sideEl.opacity here.
  // Both are already set to '0' synchronously above; resetting them inside the timer
  // would un-hide them if the user reopens the lightbox within 350ms, causing a flash.
  _lbCloseTmr = setTimeout(function(){
    _lbCloseTmr = null;
    // Guard: if lightbox was reopened before timer fired, abort all resets.
    if(document.getElementById('lb').classList.contains('on')) return;
    var img    = document.getElementById('lbImg');
    var imgBox = document.getElementById('lbImgBox');
    var colEl  = document.querySelector('.lb-col');
    img.classList.remove('lb-fadein');
    img.src = ''; img.style.opacity = '0';
    img.style.width=''; img.style.maxWidth=''; img.style.maxHeight=''; img.style.objectFit='';
    if(imgBox) { imgBox.style.width = ''; }
    if(colEl)  { colEl.style.width  = ''; }
    if(sideEl) {
      // opacity already '0' — only reset layout/position properties
      sideEl.style.position=''; sideEl.style.transform='';
      sideEl.style.left=''; sideEl.style.top=''; sideEl.style.width=''; sideEl.style.marginTop='';
    }
    // btns.opacity intentionally NOT reset here — openLb() owns its visibility on next open
  }, 350);
}

document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbBg').addEventListener('click',    closeLb);
document.getElementById('lbSide').addEventListener('click',  closeLb);

// Click on empty space to close
document.getElementById('lb').addEventListener('click', function(e){
  var wrap = document.querySelector('.lb-wrap');
  if(wrap && !wrap.contains(e.target)){ closeLb(); }
});

document.getElementById('lbPrev').addEventListener('click', function(){
  var p = _lbSibs.indexOf(curLbIdx);
  curLbIdx = _lbSibs[(p - 1 + _lbSibs.length) % _lbSibs.length];
  _lbShow(curLbIdx, -1);
});
document.getElementById('lbNext').addEventListener('click', function(){
  var p = _lbSibs.indexOf(curLbIdx);
  curLbIdx = _lbSibs[(p + 1) % _lbSibs.length];
  _lbShow(curLbIdx, 1);
});

document.addEventListener('keydown', function(e){
  if(!document.getElementById('lb').classList.contains('on')) return;
  if(e.key === 'Escape'){ closeLb(); return; }
  var p = _lbSibs.indexOf(curLbIdx);
  if(e.key === 'ArrowLeft'){ curLbIdx = _lbSibs[(p - 1 + _lbSibs.length) % _lbSibs.length]; _lbShow(curLbIdx, -1); }
  else if(e.key === 'ArrowRight'){ curLbIdx = _lbSibs[(p + 1) % _lbSibs.length]; _lbShow(curLbIdx, 1); }
});

// ── Touch: swipe-down to close + swipe-left/right to navigate ──
(function(){
  var lb   = document.getElementById('lb');
  var wrap = document.querySelector('.lb-wrap');
  var sx=0, sy=0, swDir=null, tracking=false;
  var dyAcc=0;

  // Stable proxy — defined before _lbTouchMove so openLb() can always bind it
  // regardless of script execution order. Forwards to the real handler once assigned.
  window._lbTouchMoveProxy = function(e){
    if(typeof window._lbTouchMove === 'function') window._lbTouchMove(e);
  };

  window._lbTouchMove = function lbTouchMove(e){
    if(!tracking || e.touches.length > 1) return;
    var dx  = Math.abs(e.touches[0].clientX - sx);
    var dy  = e.touches[0].clientY - sy;
    var ady = Math.abs(dy);
    if(!swDir){
      if(dx < 8 && ady < 8) return;
      swDir = dx > ady ? 'h' : 'v';
    }
    if(swDir === 'v'){
      e.preventDefault();
      dyAcc = dy * 0.28;
      wrap.style.transform = 'translateY(' + dyAcc + 'px)';
    }
  };

  lb.addEventListener('touchstart', function(e){
    if(e.touches.length > 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    tracking = true; swDir = null; dyAcc = 0;
    wrap.style.transition = 'none';
  }, {passive:true});

  lb.addEventListener('touchend', function(e){
    if(!tracking){ return; }
    tracking = false;
    if(swDir === 'v'){
      wrap.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
      wrap.style.transform  = 'translateY(0)';
      dyAcc = 0;
      return;
    }
    if(window._lbScale > 1.05){ return; }
    if(swDir !== 'h'){ return; }
    var dx = e.changedTouches[0].clientX - sx;
    if(Math.abs(dx) < 50) return;
    var p = _lbSibs.indexOf(curLbIdx);
    var dir = dx < 0 ? 1 : -1;
    curLbIdx = dx < 0
      ? _lbSibs[(p + 1) % _lbSibs.length]
      : _lbSibs[(p - 1 + _lbSibs.length) % _lbSibs.length];
    _lbShow(curLbIdx, dir);
  }, {passive:true});

  lb.addEventListener('touchcancel', function(){
    tracking = false;
    wrap.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
    wrap.style.transform  = 'translateY(0)';
  }, {passive:true});

  // ── Pinch to zoom + pan ──
  (function(){
    var lbImg    = document.getElementById('lbImg');
    var initDist = 0, initScale = 1;
    if(!window._lbScale) window._lbScale = 1;
    var lbScale  = 1;
    var panX = 0, panY = 0, initPanX = 0, initPanY = 0, panStartX = 0, panStartY = 0;

    function getDist(t){
      var dx = t[0].clientX - t[1].clientX;
      var dy = t[0].clientY - t[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }
    function applyTransform(transition){
      lbImg.style.transition = transition ? 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)' : 'none';
      lbImg.style.transform  = 'scale(' + lbScale + ') translate(' + panX + 'px,' + panY + 'px)';
    }

    lb.addEventListener('touchstart', function(e){
      if(e.touches.length === 2){
        initDist  = getDist(e.touches);
        initScale = lbScale;
      } else if(e.touches.length === 1 && lbScale > 1.05){
        panStartX = e.touches[0].clientX;
        panStartY = e.touches[0].clientY;
        initPanX  = panX;
        initPanY  = panY;
      }
    }, {passive:true});

    lb.addEventListener('touchmove', function(e){
      if(e.touches.length === 2){
        e.preventDefault();
        var newDist = getDist(e.touches);
        lbScale = window._lbScale = Math.min(Math.max(initScale * (newDist / initDist), 1), 4);
        var originX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var originY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        lbImg.style.transformOrigin = originX + 'px ' + originY + 'px';
        applyTransform(false);
      } else if(e.touches.length === 1 && lbScale > 1.05){
        e.preventDefault();
        panX = initPanX + (e.touches[0].clientX - panStartX) / lbScale;
        panY = initPanY + (e.touches[0].clientY - panStartY) / lbScale;
        applyTransform(false);
      }
    }, {passive:false});

    lb.addEventListener('touchend', function(e){
      if(e.touches.length < 2 && lbScale < 1.15){
        lbScale = window._lbScale = 1;
        panX = 0; panY = 0;
        applyTransform(true);
      }
    }, {passive:true});
  })();

  // Expose to global scope — required by inline onclick="openLb(...)" strings
  // generated in openPanel(). Without this, clicking any gallery image throws
  // "openLb is not defined" and the lightbox never opens.
  window.openLb = openLb;

})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     SACRED AUDIO SYSTEM  v3
     Pure Web Audio API — zero external files.

     Ambient: drone bank + brown noise + cosmic sweep + infrasonic pulse
     Click:   900Hz ping + harmonic + noise tick  (crisp, not sharp)
     Easter egg: 5 rapid clicks → FM alien choir (12s, then fades)
     Panel/LB transitions: LPF vacuum glass effect

<script>
(function(){
'use strict';

/* ─── State ─────────────────────────────────────────────── */
var AC           = null;
var masterGain   = null;
var masterFilter = null;
var reverbSend   = null;
var ambStarted   = false;
var audioReady   = false;

/* ─── Helpers ───────────────────────────────────────────── */
function ramp(param, target, time){
  if(!AC) return;
  var t = AC.currentTime;
  param.cancelScheduledValues(t);
  param.setValueAtTime(param.value, t);
  param.linearRampToValueAtTime(target, t + time);
}
function expRamp(param, target, time){
  if(!AC) return;
  var t = AC.currentTime;
  param.cancelScheduledValues(t);
  param.setValueAtTime(Math.max(param.value, 0.0001), t);
  param.exponentialRampToValueAtTime(Math.max(target, 0.0001), t + time);
}

/* ─── Cosmic Void Reverb IR ──────────────────────────────── */
// Physical model: outer space has NO air, so no conventional room acoustics.
// What we're simulating: the acoustic of an infinitely large resonant cavity —
// like the inside of a nebula, or the universe itself as a resonating system.
//
// Key differences from cathedral IR (old makeIR):
//   1. NO early reflections — 200ms of silence before tail begins.
//      Ref: gskinner blog — "early reflections give sense of proximity to walls"
//      → space has no walls, so we suppress them entirely.
//   2. FREQUENCY-DEPENDENT decay — Sabine's formula & Waves IR-1 guide confirm:
//      high frequencies decay faster (absorbed more readily).
//      Here: HF (>1kHz) dies in ~0.3s, MF in ~2s, LF persists 14–16s.
//      This creates the "sound falling into a void" sensation.
//   3. SLOW BUILD-IN — tail doesn't hit immediately, it swells in over 300ms.
//      Ref: EURASIP spatial audio paper — diffuse tail onset models large space size.
//   4. L/R CHANNEL DECORRELATION — not just offset, but independent noise seeds.
//      Ref: surround sound IR research (UVic) — decorrelated channels give width.
//   5. DURATION: 16s (was 6s). Ref: ReverbFX dataset allows RT60 up to 100s;
//      16s is the perceptual threshold where reverb feels "infinite" but CPU stays safe.
function makeCosmicIR(){
  var duration = 16;
  var sr  = AC.sampleRate;
  var len = sr * duration;
  var buf = AC.createBuffer(2, len, sr);

  // Pre-delay: 200ms of silence — no early reflections (no walls in space)
  var predelay = Math.floor(sr * 0.20);
  // Tail swell: 300ms rise from silence → full amplitude
  var swellLen = Math.floor(sr * 0.30);

  for(var ch = 0; ch < 2; ch++){
    var d = buf.getChannelData(ch);

    // Independent per-channel noise — decorrelates L/R for width
    // Ref: UVic surround IR study — amplitude/timing diffs between channels = spatial width
    var noiseState = ch === 0 ? 0.0 : 0.3719; // different seed per channel

    for(var i = 0; i < len; i++){
      if(i < predelay){
        d[i] = 0; // silence — no early reflections
        continue;
      }

      var pos = i - predelay;         // position within tail (0 = tail start)
      var posNorm = pos / (len - predelay); // 0→1 over tail duration

      // ── Frequency-dependent decay envelope ──
      // Technique: blend three decay rates by frequency band via noise shaping.
      // We can't do real FFT per-sample in IR generation, so we approximate
      // by layering three separately-seeded noise sources with different decay rates:
      //   Band A (LF proxy): very slow decay — survives to end of 16s
      //   Band B (MF proxy): medium decay — gone by ~3s
      //   Band C (HF proxy): fast decay — gone by ~0.4s
      // Ref: Waves IR-1 guide — "HF ratio 0.5 = HF decays at half the total RT"
      // Mixing them creates the characteristic "darkening" of long reverb tails.

      // LF band: decay constant τ = 6.0 (slow) — persists ~16s
      var envLF = Math.exp(-posNorm * 6.0);
      // MF band: decay constant τ = 18 — gone by ~3s
      var envMF = Math.exp(-posNorm * 18.0);
      // HF band: decay constant τ = 55 — gone by ~0.4s
      var envHF = Math.exp(-posNorm * 55.0);

      // Swell envelope: fade in over first 300ms of tail — space is big, takes time to fill
      var swell = pos < swellLen ? (pos / swellLen) : 1.0;
      swell = swell * swell * (3 - 2 * swell); // smoothstep C1

      // Independent noise per band (different frequency character)
      // LF: correlated noise (low freq = long wavelength = spatially coherent)
      noiseState += 0.018 * (Math.random()*2-1);
      noiseState /= 1.018;
      var noiseLF = noiseState * 4.2;

      // MF: medium correlation
      var noiseMF = (Math.random()*2-1);

      // HF: pure white noise (high freq = short wavelength = diffuse)
      var noiseHF = (Math.random()*2-1);

      // Blend — LF dominates late tail, HF only present early
      // Amplitudes: LF×0.55, MF×0.30, HF×0.15 (energy weighting)
      d[i] = swell * (
        noiseLF * envLF * 0.55 +
        noiseMF * envMF * 0.30 +
        noiseHF * envHF * 0.15
      );

      // R channel: slight amplitude variation for naturalness (not just time offset)
      if(ch === 1) d[i] *= 0.88 + Math.random()*0.06;
    }
  }
  return buf;
}

/* ─── Build ambient ─────────────────────────────────────── */
function buildAmbient(){
  masterGain   = AC.createGain();
  masterFilter = AC.createBiquadFilter();
  masterFilter.type            = 'lowpass';
  masterFilter.frequency.value = 20000;
  masterFilter.Q.value         = 0.5;
  masterGain.gain.value = 0;
  masterFilter.connect(masterGain);
  masterGain.connect(AC.destination);

  // Reverb — cosmic void, 16s — no early reflections, frequency-dependent decay
  // IR generated in next macrotask: avoids main-thread spike on AudioContext init (mobile)
  var convolver = AC.createConvolver();
  var convGain = AC.createGain();
  convGain.gain.value = 0.72; // raised from 0.58 — longer tail needs more presence
  convolver.connect(convGain);
  convGain.connect(masterFilter);

  reverbSend = AC.createGain();
  reverbSend.gain.value = 1;
  reverbSend.connect(convolver);

  setTimeout(function(){
    try{ convolver.buffer = makeCosmicIR(); } catch(e){}
  }, 80);

  // Warm pre-filter
  var warmFilter = AC.createBiquadFilter();
  warmFilter.type            = 'highshelf';
  warmFilter.frequency.value = 3200;
  warmFilter.gain.value      = -9;
  warmFilter.connect(masterFilter);
  warmFilter.connect(reverbSend);

  // ── 2. Brown noise (stars breathing) ──
  var nLen = AC.sampleRate * 4;
  var nBuf = AC.createBuffer(1, nLen, AC.sampleRate);
  var nd = nBuf.getChannelData(0);
  var last = 0;
  for(var i=0; i<nLen; i++){
    last = (last + 0.02*(Math.random()*2-1)) / 1.02;
    nd[i] = last * 3.8;
  }
  // Crossfade首尾，消除loop拼接点的爆音
  (function(data, len){ var x=Math.min(4096,Math.floor(len*0.03)); for(var xi=0;xi<x;xi++){ var f=xi/x; data[xi]*=f; data[len-1-xi]*=f; } })(nd, nLen);
  var bnoise = AC.createBufferSource();
  bnoise.buffer = nBuf; bnoise.loop = true;
  var bnFilt = AC.createBiquadFilter();
  bnFilt.type = 'bandpass'; bnFilt.frequency.value = 160; bnFilt.Q.value = 0.35;
  var bnGain = AC.createGain(); bnGain.gain.value = 0.030;
  bnoise.connect(bnFilt); bnFilt.connect(bnGain); bnGain.connect(warmFilter);
  bnoise.start();

  // ── 3. Cosmic sweep — filtered noise slowly scanning 80Hz→2kHz ──
  // Sounds like distant solar wind / radio telescope scan
  var swLen = AC.sampleRate * 8;
  var swBuf = AC.createBuffer(1, swLen, AC.sampleRate);
  var sw = swBuf.getChannelData(0);
  var swL = 0;
  for(var j=0; j<swLen; j++){
    swL = (swL + 0.018*(Math.random()*2-1)) / 1.018;
    sw[j] = swL * 4;
  }
  // Crossfade首尾，消除loop拼接点的爆音
  (function(data, len){ var x=Math.min(4096,Math.floor(len*0.02)); for(var xi=0;xi<x;xi++){ var f=xi/x; data[xi]*=f; data[len-1-xi]*=f; } })(sw, swLen);
  var swSrc = AC.createBufferSource();
  swSrc.buffer = swBuf; swSrc.loop = true;
  var swFilt = AC.createBiquadFilter();
  swFilt.type = 'bandpass'; swFilt.Q.value = 4.5;
  var swGain = AC.createGain(); swGain.gain.value = 0.018;
  // LFO that slowly sweeps the filter center frequency
  var swLFO = AC.createOscillator();
  var swLFOGain = AC.createGain();
  swLFO.type = 'sine'; swLFO.frequency.value = 0.028; // ~35s cycle
  swLFOGain.gain.value = 600;
  swFilt.frequency.value = 300;
  swLFO.connect(swLFOGain); swLFOGain.connect(swFilt.frequency);
  // ── Spatial panner LFO for cosmic sweep ──
  // Sweep sound drifts slowly left→right→left over ~40s — like distant solar wind
  // Ref: MDPI psychoacoustics — slow moving sources create sense of vast space
  // Period ~40s (0.025Hz): imperceptible as rhythm, felt as spatial depth
  var swPanner    = AC.createStereoPanner();
  var swPanLFO    = AC.createOscillator();
  var swPanLFOGain= AC.createGain();
  swPanner.pan.value   = 0;
  swPanLFO.type        = 'sine';
  swPanLFO.frequency.value = 0.025; // ~40s full cycle — slow drift
  swPanLFOGain.gain.value  = 0.55;  // pan ±0.55 — wide, sweep fills the room
  swPanLFO.connect(swPanLFOGain);
  swPanLFOGain.connect(swPanner.pan);
  swSrc.connect(swFilt); swFilt.connect(swGain);
  swGain.connect(swPanner);
  swPanner.connect(warmFilter); swPanner.connect(reverbSend);
  swSrc.start(); swLFO.start(); swPanLFO.start();

  // ── 4. Infrasonic pulse — 18Hz sine, felt not heard ──
  // Gives a sense of something vast breathing in the dark
  var infraOsc = AC.createOscillator();
  var infraGain = AC.createGain();
  infraOsc.type = 'sine'; infraOsc.frequency.value = 18;
  infraGain.gain.value = 0; // disabled — was causing low-frequency fatigue
  infraOsc.connect(infraGain); infraGain.connect(masterFilter); // 经过低通滤波，避免手机扬声器失真
  infraOsc.start();

  // ── 5. Deep space beacon — random soft pulses every 8–22s ──
  // A lone sine that fades in and out, like a distant signal
  function scheduleBeacon(){
    if(!audioReady) return;
    var delay  = 8 + Math.random() * 14;
    var freq   = [110, 146.8, 174.6, 220, 261.6][Math.floor(Math.random()*5)];
    setTimeout(function(){
      if(!AC || !audioReady) return;
      var t  = AC.currentTime;
      var bo = AC.createOscillator();
      var bg = AC.createGain();
      bo.type = 'sine'; bo.frequency.value = freq;
      // Subtle pitch drift — like a signal struggling through interference
      bo.detune.setValueAtTime(0, t);
      bo.detune.linearRampToValueAtTime((Math.random()-0.5)*18, t + 3);
      bo.detune.linearRampToValueAtTime(0, t + 7);
      bg.gain.setValueAtTime(0, t);
      bg.gain.linearRampToValueAtTime(0.032, t + 2.2); // softer, slower fade-in
      bg.gain.setTargetAtTime(0, t + 2.2, 1.4);
      bo.connect(bg);
      bg.connect(warmFilter); // through warm filter for consistent tonal colour
      bg.connect(reverbSend);
      bo.start(t); bo.stop(t + 10);
      scheduleBeacon();
    }, delay * 1000);
  }

  ramp(masterGain.gain, 0.78, 4.0);
  audioReady = true;
  setTimeout(scheduleBeacon, 6000); // first beacon after 6s

  // ── 6. VOID SOUND SYSTEM — three-layer muffled dread ──
  // Physical basis: Tandy & Lawrence (1998), Journal of the Society for Psychical Research.
  // Goldsmiths Haunt project: 18.9Hz + 22.3Hz dual-sine produces strongest anomalous
  // psychological response — more effective than single frequency infrasound.
  // Tiger attack infrasound: ~18Hz used to immobilize prey via fear/anxiety response.
  // Three layers, each triggered independently at random intervals.

  // ─ Layer A: Gravitational Resonance ─
  // 18.9Hz + 22.3Hz dual sine — exact Goldsmiths Haunt frequencies.
  // Felt as pressure in chest, not consciously heard.
  // Emerges slowly, holds, then dissolves. Like something immense passing nearby.
  function scheduleGravResonance(){
    if(!audioReady) return;
    var delay = 20000 + Math.random()*35000; // 20–55s intervals — unpredictable
    setTimeout(function(){
      if(!AC || !audioReady) return;
      var t   = AC.currentTime;
      var dur = 5 + Math.random()*8; // 5–13s duration — varies each time

      // 18.9Hz — primary fear frequency (Tandy & Lawrence 1998)
      var o1 = AC.createOscillator(), g1 = AC.createGain();
      o1.type = 'sine'; o1.frequency.value = 18.9;
      // Micro-drift: ±0.3Hz wandering — prevents standing wave fatigue
      o1.frequency.setValueAtTime(18.9, t);
      o1.frequency.linearRampToValueAtTime(19.2, t + dur*0.5);
      o1.frequency.linearRampToValueAtTime(18.6, t + dur);
      g1.gain.setValueAtTime(0, t);
      g1.gain.linearRampToValueAtTime(0.028, t + dur*0.35); // slow rise — 35% of duration
      g1.gain.setTargetAtTime(0, t + dur*0.6, dur*0.18);    // exponential decay from 60%
      o1.connect(g1); g1.connect(masterFilter);
      o1.start(t); o1.stop(t + dur + 2);

      // 22.3Hz — secondary frequency (Goldsmiths experiment)
      // Slightly detuned from 18.9 — the beat frequency between them (~3.4Hz)
      // falls in theta brainwave range, associated with unease and hypnagogic states
      var o2 = AC.createOscillator(), g2 = AC.createGain();
      o2.type = 'sine'; o2.frequency.value = 22.3;
      o2.frequency.setValueAtTime(22.3, t);
      o2.frequency.linearRampToValueAtTime(22.0, t + dur*0.4);
      o2.frequency.linearRampToValueAtTime(22.5, t + dur);
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.019, t + dur*0.4);
      g2.gain.setTargetAtTime(0, t + dur*0.65, dur*0.15);
      o2.connect(g2); g2.connect(masterFilter);
      o2.start(t); o2.stop(t + dur + 2);

      scheduleGravResonance();
    }, delay);
  }

  // ─ Layer B: Nebula Turbulence Rumble ─
  // Bandpass-filtered brown noise, very low cutoff (40–90Hz).
  // Sounds like: gas cloud pressure front, distant thunder through vacuum,
  // the sound of a star a million miles away dying.
  // Shape varies — sometimes short sharp gust, sometimes long slow surge.
  function scheduleTurbulence(){
    if(!audioReady) return;
    var delay = 15000 + Math.random()*28000; // 15–43s
    setTimeout(function(){
      if(!AC || !audioReady) return;
      var t   = AC.currentTime;
      var dur = 2.5 + Math.random()*7; // 2.5–9.5s — wide range feels organic
      var isSharp = Math.random() > 0.5; // sharp gust vs long surge

      // Brown noise source
      var tLen  = AC.sampleRate * Math.ceil(dur + 1);
      var tBuf  = AC.createBuffer(1, tLen, AC.sampleRate);
      var tData = tBuf.getChannelData(0);
      var tLast = 0;
      for(var ti=0; ti<tLen; ti++){
        tLast = (tLast + 0.02*(Math.random()*2-1)) / 1.02;
        tData[ti] = tLast * 4;
      }
      var tSrc  = AC.createBufferSource();
      tSrc.buffer = tBuf;

      // Bandpass — low cutoff gives the muffled, pressure-behind-a-wall quality
      var tFilt = AC.createBiquadFilter();
      tFilt.type = 'lowpass';
      tFilt.frequency.value = 55 + Math.random()*40; // 55–95Hz — varies each event
      tFilt.Q.value = 0.8;

      var tGain = AC.createGain();
      tGain.gain.setValueAtTime(0, t);
      if(isSharp){
        // Sharp gust: fast attack (0.3s), faster decay
        tGain.gain.linearRampToValueAtTime(0.055, t + 0.3);
        tGain.gain.setTargetAtTime(0, t + 0.3, 0.8);
      } else {
        // Long surge: slow build, slow dissolve — like pressure front passing
        tGain.gain.linearRampToValueAtTime(0.038, t + dur*0.4);
        tGain.gain.setTargetAtTime(0, t + dur*0.55, dur*0.22);
      }

      // Subtle low-frequency panning drift — turbulence moves through space
      var tPan = AC.createStereoPanner();
      var tPanDir = Math.random() > 0.5 ? 1 : -1;
      tPan.pan.setValueAtTime(-tPanDir*0.4, t);
      tPan.pan.linearRampToValueAtTime(tPanDir*0.4, t + dur); // drifts across stereo field

      tSrc.connect(tFilt); tFilt.connect(tGain);
      tGain.connect(tPan); tPan.connect(masterFilter);
      tPan.connect(reverbSend); // into reverb — gives spatial depth
      tSrc.start(t); tSrc.stop(t + dur + 1);

      scheduleTurbulence();
    }, delay);
  }

  // ─ Layer C: Structural Creak ─
  // The rarest, most unsettling. Harmonically rich but extremely brief.
  // Technique: detuned sine cluster — 3 sines within 2Hz of each other,
  // creates beating/phasing that sounds like metal under strain, or
  // something very large shifting its weight in the darkness.
  // Ref: whale song infrasound uses similar harmonic clustering for long-distance
  // communication — the brain interprets it as a living thing.
  function scheduleCreak(){
    if(!audioReady) return;
    var delay = 35000 + Math.random()*55000; // 35–90s — very rare, keeps it surprising
    setTimeout(function(){
      if(!AC || !audioReady) return;
      var t    = AC.currentTime;
      var base = 28 + Math.random()*18; // 28–46Hz base — below hearing but felt
      var dur  = 0.8 + Math.random()*2.2; // 0.8–3s — brief, like a creak

      // Three detuned sines — beating pattern mimics organic/structural sound
      var offsets = [0, 0.8 + Math.random()*0.6, -(0.5 + Math.random()*0.5)];
      offsets.forEach(function(off, oi){
        var co = AC.createOscillator(), cg = AC.createGain();
        co.type = 'sine';
        co.frequency.value = base + off;
        // Slight frequency sweep — like tension releasing
        co.frequency.linearRampToValueAtTime(base + off + (Math.random()-0.5)*3, t + dur);
        cg.gain.setValueAtTime(0, t);
        cg.gain.linearRampToValueAtTime(0.022 - oi*0.006, t + 0.08); // sharp attack
        cg.gain.setTargetAtTime(0, t + dur*0.3, dur*0.28);           // then decay
        co.connect(cg);
        cg.connect(masterFilter);
        cg.connect(reverbSend); // reverb tail makes it linger like a real resonance
        co.start(t); co.stop(t + dur + 1.5);
      });

      scheduleCreak();
    }, delay);
  }

  // Void sound layers disabled — GravResonance / Turbulence / Creak removed
  // (18Hz infrasound + low-freq bombardment caused listening fatigue)
  // setTimeout(scheduleGravResonance, 18000);
  // setTimeout(scheduleTurbulence,    10000);
  // setTimeout(scheduleCreak,         40000);
}

/* ─── Init ──────────────────────────────────────────────── */
function initAudio(){
  if(ambStarted) return;
  ambStarted = true;
  try{
    AC = new (window.AudioContext || window.webkitAudioContext)();
    if(AC.state === 'suspended') AC.resume();
    buildAmbient();
  } catch(e){ console.warn('Audio:', e); }
}

/* ─── Crystal click SFX ─────────────────────────────────── */
// Soft bell/jade timbre — triangle waves roll off high harmonics naturally.
// Three layers: warm body (triangle), low octave (sine), subtle inharmonic bell partial.
// No noise tick — replaced with a very brief pink-ish low-pass burst for "touch" texture.
// Five presets randomised on each call; additional micro-jitter makes every hit unique.
function playCrystalClick(){
  if(!AC || !audioReady) return;
  var t = AC.currentTime;

  // Presets: [bodyFreq, bodyTarget, tailTC, bodyGain, partialRatio, subMult]
  // bodyFreq kept 400–650Hz — comfortable midrange, nothing harsh
  // partialRatio < 1.5 keeps all harmonics well below 1kHz
  var presets = [
    [ 520, 360, 0.11, 0.13, 1.33, 0.52 ], // jade tap — clean & centred
    [ 480, 340, 0.13, 0.14, 1.28, 0.50 ], // slightly rounder
    [ 580, 400, 0.10, 0.11, 1.40, 0.55 ], // a touch brighter but still soft
    [ 440, 310, 0.14, 0.15, 1.25, 0.48 ], // deeper, muted bell
    [ 560, 390, 0.12, 0.12, 1.36, 0.53 ], // balanced — between jade and bell
  ];
  var p = presets[Math.floor(Math.random() * presets.length)];

  // ±5% freq jitter, ±10% gain jitter
  function jf(v){ return v * (0.95 + Math.random()*0.10); }
  function jg(v){ return v * (0.90 + Math.random()*0.20); }

  var bodyF  = jf(p[0]);
  var bodyT  = jf(p[1]);
  var tailTC = p[2] * (0.90 + Math.random()*0.20);
  var bodyG  = jg(p[3]);
  var partF  = jf(bodyF * p[4]);   // inharmonic partial — always below 1kHz
  var partT  = jf(bodyT * p[4]);
  var subF   = jf(bodyF * p[5]);   // warm sub, always below 350Hz

  // ── Body — triangle wave, warm + naturally band-limited ──
  var osc = AC.createOscillator();
  var ogn = AC.createGain();
  osc.type = 'triangle';            // triangle has -12dB/oct harmonic rolloff vs sine's none
  osc.frequency.setValueAtTime(bodyF, t);
  osc.frequency.exponentialRampToValueAtTime(bodyT, t + 0.08 + Math.random()*0.04);
  ogn.gain.setValueAtTime(0, t);
  ogn.gain.linearRampToValueAtTime(bodyG, t + 0.010);   // 10ms attack — rounded transient
  ogn.gain.setTargetAtTime(0, t + 0.010, tailTC);
  osc.connect(ogn);
  ogn.connect(masterFilter);
  ogn.connect(reverbSend);
  osc.start(t); osc.stop(t + 0.55);

  // ── Inharmonic partial — sine, adds bell character without adding harshness ──
  var osc2 = AC.createOscillator();
  var ogn2 = AC.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(partF, t);
  osc2.frequency.exponentialRampToValueAtTime(partT, t + 0.09);
  ogn2.gain.setValueAtTime(0, t);
  ogn2.gain.linearRampToValueAtTime(jg(bodyG * 0.28), t + 0.010);
  ogn2.gain.setTargetAtTime(0, t + 0.010, tailTC * 0.65);
  osc2.connect(ogn2); ogn2.connect(masterFilter);
  osc2.start(t); osc2.stop(t + 0.40);

  // ── Sub warmth — pure sine, below 350Hz, very short — "weight" of the tap ──
  var osc3 = AC.createOscillator();
  var ogn3 = AC.createGain();
  osc3.type = 'sine';
  osc3.frequency.value = subF;
  ogn3.gain.setValueAtTime(0, t);
  ogn3.gain.linearRampToValueAtTime(jg(bodyG * 0.22), t + 0.006);
  ogn3.gain.setTargetAtTime(0, t + 0.006, 0.045 + Math.random()*0.015);
  osc3.connect(ogn3); ogn3.connect(masterFilter);
  osc3.start(t); osc3.stop(t + 0.20);

  // ── Touch texture — pink-ish noise, low-passed at 800Hz, barely audible ──
  // Replaces the harsh 3k–8k tick with just a soft "contact" feel
  var nSmp = Math.floor(AC.sampleRate * 0.018);
  var nBuf = AC.createBuffer(1, nSmp, AC.sampleRate);
  var nd = nBuf.getChannelData(0), nL = 0;
  for(var i=0; i<nSmp; i++){
    nL = (nL + 0.15*(Math.random()*2-1)) / 1.15; // pink-ish integration
    nd[i] = nL * Math.pow(1 - i/nSmp, 3);        // fast cubic fade
  }
  var nSrc = AC.createBufferSource(); nSrc.buffer = nBuf;
  var nLP  = AC.createBiquadFilter(); nLP.type = 'lowpass'; nLP.frequency.value = 800;
  var nGn  = AC.createGain(); nGn.gain.value = 0.055 + Math.random()*0.02;
  nSrc.connect(nLP); nLP.connect(nGn); nGn.connect(masterFilter);
  nSrc.start(t); nSrc.stop(t + 0.020);
}

/* ─── Easter egg — alien choir ──────────────────────────── */
// Triggered after 5 crystal clicks within 4 seconds.
// FM synthesis: carrier + modulator creates inharmonic metallic tones.
// Six voices, slightly detuned, over a 12s arc — rises then dissolves.
var _clickTimes  = [];
var _eggActive   = false;

function checkEasterEgg(){
  var now = Date.now();
  _clickTimes.push(now);
  // Keep only clicks from last 4 seconds
  _clickTimes = _clickTimes.filter(function(t){ return now - t < 4000; });
  if(_clickTimes.length >= 5 && !_eggActive){
    _clickTimes = [];
    triggerAlienChoir();
  }
}

function triggerAlienChoir(){
  if(!AC || !audioReady) return;
  _eggActive = true;

  // Extra-long reverb for the egg
  var eggConv  = AC.createConvolver();
  eggConv.buffer = makeIR(10, 1.8);
  var eggRevGain = AC.createGain(); eggRevGain.gain.value = 0.75; // was 1.1
  eggConv.connect(eggRevGain); eggRevGain.connect(masterFilter);

  var eggMaster = AC.createGain();
  eggMaster.gain.value = 0;
  eggMaster.connect(masterFilter);
  eggMaster.connect(eggConv);

  var t = AC.currentTime;

  // Fade in over 2.5s (was 2s) — less startling entry
  eggMaster.gain.linearRampToValueAtTime(0, t);
  eggMaster.gain.linearRampToValueAtTime(0.38, t + 2.5); // was 0.55
  eggMaster.gain.setValueAtTime(0.38, t + 8);
  eggMaster.gain.linearRampToValueAtTime(0, t + 12);

  // Six FM voices — each: carrier osc modulated by modulator osc
  // Carrier frequencies chosen to be slightly microtonal / alien
  var voices = [
    { car:137.2, mod:183.5, idx:2.8, dur:11.5 },
    { car:184.6, mod:97.3,  idx:3.4, dur:10.8 },
    { car:220.0, mod:311.1, idx:1.9, dur:12.0 },
    { car:261.1, mod:174.5, idx:4.1, dur:10.2 },
    { car:329.6, mod:220.4, idx:2.2, dur:11.0 },
    { car:415.3, mod:277.2, idx:3.7, dur:9.8  },
  ];

  voices.forEach(function(v, vi){
    var carrier  = AC.createOscillator();
    var modOsc   = AC.createOscillator();
    var modGain  = AC.createGain();
    var carGain  = AC.createGain();

    carrier.type  = 'sine';
    carrier.frequency.value = v.car;
    // Slow random pitch drift — alien vocal quality
    carrier.detune.setValueAtTime(0, t);
    carrier.detune.linearRampToValueAtTime((Math.random()-0.5)*40, t + 6);
    carrier.detune.linearRampToValueAtTime((Math.random()-0.5)*30, t + 12);

    modOsc.type = 'sine';
    modOsc.frequency.value = v.mod;
    modGain.gain.value = v.mod * v.idx; // FM depth = mod freq × index

    carGain.gain.value = 0.12 + Math.random()*0.04;

    // Stagger entry — each voice enters slightly offset
    var entryDelay = vi * 0.28;
    carGain.gain.setValueAtTime(0, t + entryDelay);
    carGain.gain.linearRampToValueAtTime(0.12, t + entryDelay + 0.8);

    modOsc.connect(modGain);
    modGain.connect(carrier.frequency); // FM: modulator → carrier freq
    carrier.connect(carGain);
    carGain.connect(eggMaster);

    carrier.start(t + entryDelay); carrier.stop(t + v.dur);
    modOsc.start(t + entryDelay);  modOsc.stop(t + v.dur);
  });

  // Reset egg flag after 14s
  setTimeout(function(){ _eggActive = false; }, 14000);
}

// Softer two-tone design: 640Hz body + 960Hz shimmer

function audioPanelOpen(){
  if(!AC || !audioReady) return;

  expRamp(masterFilter.frequency, 1800, 0.65);

}
function audioPanelClose(){

  expRamp(masterFilter.frequency, 20000, 1.0);

/* ─── Lightbox transitions ──────────────────────────────── */
function audioLbOpen(){
  if(!AC || !audioReady) return;
  var t = AC.currentTime;
  reverbSend.gain.cancelScheduledValues(t);
  reverbSend.gain.setValueAtTime(1, t);
  reverbSend.gain.linearRampToValueAtTime(2.6, t + 0.08);
  reverbSend.gain.setTargetAtTime(1, t + 0.08, 0.3);
  ramp(masterFilter.frequency, 14000, 0.4);
  ramp(masterGain.gain,        0.68,  0.35);
}
function audioLbClose(){
  if(!AC || !audioReady) return;
  expRamp(masterFilter.frequency, 20000, 0.7);
  ramp(masterGain.gain,           0.78,  0.6);
}

/* ─── Hover ─────────────────────────────────────────────── */
var _lastHoverT = 0;
function audioHover(){
  if(!AC || !audioReady) return;
  var now = AC.currentTime;
  if(now - _lastHoverT < 0.22) return;
  _lastHoverT = now;
  var osc = AC.createOscillator();
  var gn  = AC.createGain();
  // 900Hz (was 1800Hz) — half the frequency, far less fatiguing
  osc.type = 'sine'; osc.frequency.value = 900;
  gn.gain.setValueAtTime(0, now);
  gn.gain.linearRampToValueAtTime(0.016, now + 0.014); // slightly softer
  gn.gain.setTargetAtTime(0, now + 0.014, 0.042);
  osc.connect(gn); gn.connect(masterFilter);
  osc.start(now); osc.stop(now + 0.22);
}

window.addEventListener('load', function(){

  ['click','touchstart','keydown'].forEach(function(evt){
    document.addEventListener(evt, function _init(){
      initAudio();
      document.removeEventListener(evt, _init);
    }, {once:true, passive:true});
  });

  // Panel observer
  var panelEl = document.getElementById('panel');
  if(panelEl){
    var _panelWasOn = false;
    new MutationObserver(function(){
      var isOn = panelEl.classList.contains('on');
      if(isOn && !_panelWasOn){
        playCrystalClick();
        checkEasterEgg();
        setTimeout(audioPanelOpen, 60);
        _panelWasOn = true;
      } else if(!isOn && _panelWasOn){
        audioPanelClose();
        playUIClick();
        _panelWasOn = false;
      }
    }).observe(panelEl, {attributes:true, attributeFilter:['class']});
  }

  // Lightbox observer
  var lbEl = document.getElementById('lb');
  if(lbEl){
    var _lbWasOn = false;
    new MutationObserver(function(){
      var isOn = lbEl.classList.contains('on');
      if(isOn && !_lbWasOn){ audioLbOpen(); _lbWasOn = true; }
      else if(!isOn && _lbWasOn){ audioLbClose(); _lbWasOn = false; }
    }).observe(lbEl, {attributes:true, attributeFilter:['class']});
  }

  // Hover on Three.js canvas
  var threeCanvas = document.getElementById('three');
  if(threeCanvas){
    threeCanvas.addEventListener('mousemove', function(){
      if(document.body.classList.contains('hovering')) audioHover();
    }, {passive:true});
  }

  // UI buttons
  ['panelClose','lbClose','lbPrev','lbNext'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.addEventListener('click', playUIClick, {passive:true});
  });
});

})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     CONTENT PROTECTION
     Blocks: right-click context menu, image drag, mobile long-press save,
     desktop text/image selection. Soft deterrent — not DRM.
═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
'use strict';

// ── Right-click context menu ──
document.addEventListener('contextmenu', function(e){
  e.preventDefault(); return false;
}, false);

// ── Image / link drag ──
document.addEventListener('dragstart', function(e){
  if(e.target.tagName === 'IMG' || e.target.tagName === 'A') e.preventDefault();
}, false);

// ── Mobile long-press — belt-and-suspenders on top of CSS ──
var _lpTimer = null;
document.addEventListener('touchstart', function(e){
  if(e.target.tagName === 'IMG'){
    _lpTimer = setTimeout(function(){
      if(document.activeElement) document.activeElement.blur();
    }, 500);
  }
}, {passive:true});
document.addEventListener('touchend',  function(){ clearTimeout(_lpTimer); }, {passive:true});
document.addEventListener('touchmove', function(){ clearTimeout(_lpTimer); }, {passive:true});

// ── Text / image selection ──
document.addEventListener('selectstart', function(e){
  var tag = e.target.tagName;
  if(tag !== 'INPUT' && tag !== 'TEXTAREA') e.preventDefault();
}, false);

})();
</script>
